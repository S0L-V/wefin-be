name: wefin

services:
  postgres:
    image: postgres:16
    container_name: wefin-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-wefin_dev}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: