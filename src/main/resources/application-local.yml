spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wefin_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET}

news:
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    display: ${NAVER_NEWS_DISPLAY:100}
    base-url: ${NAVER_NEWS_BASE_URL:https://openapi.naver.com/v1/search/news.json}
  collect:
    cron: ${NEWS_COLLECT_CRON:-}

stock:
  collect:
    enabled: false

briefing:
  collect:
    enabled: false



market:
  bok:
    api-key: ${BOK_API_KEY:}
    base-url: ${BOK_BASE_URL:https://ecos.bok.or.kr/api}
  collect:
    cron: ${MARKET_COLLECT_CRON:-}

embedding:
  collect:
    cron: ${EMBEDDING_COLLECT_CRON:-}

tagging:
  collect:
    cron: ${TAGGING_COLLECT_CRON:-}

clustering:
  collect:
    cron: ${CLUSTERING_COLLECT_CRON:-}
  merge:
    cron: ${CLUSTER_MERGE_CRON:-}

summary:
  collect:
    cron: ${SUMMARY_COLLECT_CRON:-}

batch:
  news:
    crawl-size: ${NEWS_CRAWL_BATCH_SIZE:100}
    embedding-size: ${NEWS_EMBEDDING_BATCH_SIZE:100}
    tagging-size: ${NEWS_TAGGING_BATCH_SIZE:100}
    clustering-size: ${NEWS_CLUSTERING_BATCH_SIZE:100}
    summary-size: ${NEWS_SUMMARY_BATCH_SIZE:20}
    rejudge-max-limit: ${NEWS_REJUDGE_MAX_LIMIT:100}

websocket:
  allowed-origins:
    - http://localhost:5173
    - http://localhost:5174