spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wefin_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true

ai:
  server:
    url: ${AI_SERVER_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:local-secret-key-change-me}

websocket:
  allowed-origins:
    - http://localhost:5173
