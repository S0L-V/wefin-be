spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

ai:
  server:
    url: ${AI_SERVER_URL}

jwt:
  secret: ${JWT_SECRET}

news:
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    display: ${NAVER_NEWS_DISPLAY:100}
  collect:
    cron: "0 0 */2 * * *"

server:
  forward-headers-strategy: native

market:
  bok:
    api-key: ${BOK_API_KEY:}
    base-url: ${BOK_BASE_URL:https://ecos.bok.or.kr/api}
  collect:
    cron: "0 */5 * * * *"

embedding:
  collect:
    cron: "0 */30 * * * *"

tagging:
  collect:
    cron: "0 */30 * * * *"

clustering:
  collect:
    cron: "0 */30 * * * *"

summary:
  collect:
    cron: "0 */30 * * * *"

websocket:
  allowed-origins:
    - https://wefin.ai.kr