spring:
  application:
    name: wefin

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  flyway:
    enabled: true
    locations: classpath:db/migration

openai:
  api-key: ${OPENAI_API_KEY:}
  embedding:
    model: text-embedding-3-small
    version: v1

embedding:
  collect:
    cron: "0 */30 * * * *"

websocket:
  allowed-origins:
    - http://localhost:5173

hantu:
  api:
    baseUrl: https://openapivts.koreainvestment.com:29443
    appkey: ${HANTU_APPKEY:}
    appsecret: ${HANTU_APPSECRET:}