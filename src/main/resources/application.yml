spring:
  application:
    name: wefin

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  flyway:
    enabled: true
    locations: classpath:db/migration

websocket:
  allowed-origins:
    - http://localhost:5173

hantu:
  api:
    baseUrl: https://openapivts.koreainvestment.com:29443
    appkey: ${HANTU_APPKEY}
    appsecret: ${HANTU_APPSECRET}