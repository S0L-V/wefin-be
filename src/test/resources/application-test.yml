spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

ai:
  server:
    url: http://localhost:8000

jwt:
  secret: ${JWT_SECRET:wefin-test-jwt-secret-key-1234567890}

news:
  naver:
    client-id: test-client-id
    client-secret: test-client-secret
    display: 10
  collect:
    cron: "-"

market:
  bok:
    api-key: test-bok-key
    base-url: https://ecos.bok.or.kr/api
  collect:
    cron: "-"

openai:
  api-key: test-openai-key
  embedding:
    model: text-embedding-3-small
    version: v1
  tagging:
    model: gpt-4o-mini

embedding:
  collect:
    cron: "-"

tagging:
  collect:
    cron: "-"
