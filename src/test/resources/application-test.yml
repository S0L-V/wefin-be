spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

ai:
  server:
    url: http://localhost:8000

jwt:
  secret: test-secret-key

news:
  naver:
    client-id: test-client-id
    client-secret: test-client-secret
    display: 10
  collect:
    cron: "-"

market:
  bok:
    api-key: test-bok-key
    base-url: https://ecos.bok.or.kr/api
  collect:
    cron: "-"

openai:
  api-key: test-openai-key
  embedding:
    model: text-embedding-3-small
    version: v1

embedding:
  collect:
    cron: "-"
