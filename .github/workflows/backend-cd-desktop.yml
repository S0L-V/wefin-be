name: Backend CD (Desktop)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Prepare app.jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          cp "$JAR_FILE" app.jar

      - name: Build Docker image
        run: docker build -t wefin-backend:desktop .

      - name: Copy files to deploy directory
        run: |
          cp docker-compose-desktop.yml ~/wefin/
          cp -r nginx ~/wefin/

      - name: Deploy with docker compose
        run: |
          cd ~/wefin
          docker compose --env-file .env.desktop -f docker-compose-desktop.yml stop backend || true
          docker compose --env-file .env.desktop -f docker-compose-desktop.yml rm -f backend || true
          docker compose --env-file .env.desktop -f docker-compose-desktop.yml up -d

      - name: Verify deployment
        run: |
          sleep 10
          docker ps | grep wefin-backend-desktop
          echo "Backend deployed successfully"

      - name: Clean unused images
        run: docker image prune -f
