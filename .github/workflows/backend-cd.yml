name: Backend CD

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Prepare app.jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          cp "$JAR_FILE" app.jar

      - name: Set deployment variables
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.prod.yml" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.dev.yml" >> $GITHUB_ENV
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Check selected deployment target
        run: |
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "IMAGE_TAG=${IMAGE_TAG}"
          echo "COMPOSE_FILE=${COMPOSE_FILE}"

      - name: Docker Hub login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/carecall-backend:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/carecall-backend:${{ env.IMAGE_TAG }}

      - name: Check compose file exists
        run: ls -al ${{ env.COMPOSE_FILE }}

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "${{ env.COMPOSE_FILE }}"
          target: "/home/${{ secrets.EC2_USERNAME }}/deploy"
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            mkdir -p /home/${{ secrets.EC2_USERNAME }}/deploy
            cd /home/${{ secrets.EC2_USERNAME }}/deploy

            echo "=== Current files in deploy dir ==="
            ls -al

            echo "=== Pull latest image ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/carecall-backend:${{ env.IMAGE_TAG }}

            echo "=== Restart container ==="
            docker compose -f ${{ env.COMPOSE_FILE }} down || true
            docker compose -f ${{ env.COMPOSE_FILE }} up -d

            echo "=== Running containers ==="
            docker ps

            echo "=== Remove unused images ==="
            docker image prune -f